  <text x="392" y="330" font-size="16" fill="#c9a96e" opacity="0.35" text-anchor="middle">✦</text>
  <text x="688" y="330" font-size="16" fill="#c9a96e" opacity="0.35" text-anchor="middle">✦</text>
  <text x="540" y="242" font-size="11" fill="#c9a96e" opacity="0.28" text-anchor="middle">✦</text>

