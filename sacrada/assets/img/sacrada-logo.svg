<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1228"/>
    </radialGradient>
    <radialGradient id="wing-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="0"/>

  <!-- Concentric orbit rings -->
  <circle cx="200" cy="185" r="60"  fill="none" stroke="#c9a96e" stroke-opacity="0.10" stroke-width="0.8"/>
  <circle cx="200" cy="185" r="85"  fill="none" stroke="#c9a96e" stroke-opacity="0.09" stroke-width="0.7"/>
  <circle cx="200" cy="185" r="110" fill="none" stroke="#c9a96e" stroke-opacity="0.07" stroke-width="0.6"/>
  <circle cx="200" cy="185" r="138" fill="none" stroke="#c9a96e" stroke-opacity="0.05" stroke-width="0.5"/>
  <circle cx="200" cy="185" r="166" fill="none" stroke="#c9a96e" stroke-opacity="0.04" stroke-width="0.5"/>

  <!-- Ambient glow behind wing -->
  <ellipse cx="200" cy="175" rx="90" ry="90" fill="url(#wing-glow)"/>

  <!-- Angel Wing (left) -->
  <g fill="#c9a96e" opacity="0.92">
    <!-- Left wing -->
    <path d="
      M 200 230
      C 185 210, 148 195, 140 165
      C 135 145, 148 128, 162 122
      C 152 138, 155 155, 168 168
      C 158 150, 162 130, 175 122
      C 168 138, 170 158, 182 170
      C 176 150, 180 132, 192 125
      C 188 142, 190 162, 200 172
      Z
    " opacity="0.85"/>
    <!-- Right wing (mirrored) -->
    <path d="
      M 200 230
      C 215 210, 252 195, 260 165
      C 265 145, 252 128, 238 122
      C 248 138, 245 155, 232 168
      C 242 150, 238 130, 225 122
      C 232 138, 230 158, 218 170
      C 224 150, 220 132, 208 125
      C 212 142, 210 162, 200 172
      Z
    " opacity="0.85"/>
    <!-- Center body / base of wings -->
    <ellipse cx="200" cy="215" rx="7" ry="18" opacity="0.6"/>
    <!-- Small halo ring above wings -->
    <ellipse cx="200" cy="116" rx="18" ry="5" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>

  <!-- Small star accents -->
  <text x="148" y="148" font-size="7" fill="#c9a96e" opacity="0.45" text-anchor="middle">✦</text>
  <text x="252" y="148" font-size="7" fill="#c9a96e" opacity="0.45" text-anchor="middle">✦</text>
  <text x="200" y="96"  font-size="5" fill="#c9a96e" opacity="0.35" text-anchor="middle">✦</text>

  <!-- Wordmark -->
  <text
    x="200" y="282"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="32"
    font-weight="300"
    letter-spacing="10"
    fill="#c9a96e"
    text-anchor="middle"
  >SACRADA</text>

  <!-- Tagline -->
  <text
    x="200" y="306"
    font-family="'Space Mono', monospace"
    font-size="7"
    letter-spacing="3.5"
    fill="#c9a96e"
    opacity="0.5"
    text-anchor="middle"
  >SACRED · BREATH · TRUTH</text>

  <!-- Thin rule under wordmark -->
  <line x1="140" y1="314" x2="260" y2="314" stroke="#c9a96e" stroke-opacity="0.2" stroke-width="0.5"/>

</svg>
