  <!-- Star accents -->
  <text x="400" y="340" font-size="18" fill="#c9a96e" opacity="0.4" text-anchor="middle">✦</text>
  <text x="680" y="340" font-size="18" fill="#c9a96e" opacity="0.4" text-anchor="middle">✦</text>
  <text x="540" y="252" font-size="12" fill="#c9a96e" opacity="0.3" text-anchor="middle">✦</text>

